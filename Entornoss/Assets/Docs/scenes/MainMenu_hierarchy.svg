  <line x1="770" y1="200" x2="1130" y2="200" stroke="#7040c0" stroke-width="1.8"/>
  <line x1="770"  y1="200" x2="770"  y2="204" stroke="#7040c0" stroke-width="1.8"/>
  <line x1="890"  y1="200" x2="890"  y2="204" stroke="#7040c0" stroke-width="1.8"/>
  <line x1="1010" y1="200" x2="1010" y2="204" stroke="#7040c0" stroke-width="1.8"/>
  <line x1="1130" y1="200" x2="1130" y2="204" stroke="#7040c0" stroke-width="1.8"/>

