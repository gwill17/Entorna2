  <text x="600" y="64" text-anchor="middle"
        font-family="'Segoe UI',Arial,sans-serif"
        font-size="10" fill="#7090c0">Scene Root</text>

  <!-- ROOT to trunk -->
  <line x1="600" y1="74" x2="600" y2="94" stroke="#8090a8" stroke-width="1.8"/>

  <!-- HORIZONTAL TRUNK LEVEL 1 -->
  <line x1="80" y1="94" x2="950" y2="94" stroke="#8090a8" stroke-width="1.8"/>
  <line x1="80"  y1="94" x2="80"  y2="98" stroke="#8090a8" stroke-width="1.8"/>
  <line x1="220" y1="94" x2="220" y2="98" stroke="#8090a8" stroke-width="1.8"/>
  <line x1="360" y1="94" x2="360" y2="98" stroke="#8090a8" stroke-width="1.8"/>
  <line x1="500" y1="94" x2="500" y2="98" stroke="#8090a8" stroke-width="1.8"/>
  <line x1="620" y1="94" x2="620" y2="98" stroke="#8090a8" stroke-width="1.8"/>
  <line x1="950" y1="94" x2="950" y2="98" stroke="#8090a8" stroke-width="1.8"/>

  <!-- NIVEL 1: Main Camera -->
  <rect x="15" y="98" width="130" height="60" rx="8" ry="8"
        fill="#f0f2f8" stroke="#7080a0" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="15" y="98" width="130" height="5" rx="8" ry="8" fill="#6078a0"/>
  <rect x="15" y="101" width="130" height="2" fill="#6078a0"/>
  <text x="80" y="120" text-anchor="middle"
        font-family="'Segoe UI',Arial,sans-serif"
        font-size="12" font-weight="700" fill="#1e2d45">Main Camera</text>
  <text x="80" y="138" text-anchor="middle"
        font-family="'Segoe UI',Arial,sans-serif"
        font-size="10" fill="#5070a0">Camera</text>

  <!-- NIVEL 1: Directional Light -->
  <rect x="155" y="98" width="130" height="60" rx="8" ry="8"
        fill="#f0f2f8" stroke="#7080a0" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="155" y="98" width="130" height="5" rx="8" ry="8" fill="#6078a0"/>
  <rect x="155" y="101" width="130" height="2" fill="#6078a0"/>
  <text x="220" y="120" text-anchor="middle"
        font-family="'Segoe UI',Arial,sans-serif"
        font-size="12" font-weight="700" fill="#1e2d45">Directional Light</text>
  <text x="220" y="138" text-anchor="middle"
        font-family="'Segoe UI',Arial,sans-serif"
