<svg xmlns="http://www.w3.org/2000/svg" width="1220" height="375" viewBox="0 0 1220 375">
  <defs>
    <filter id="sh" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1e2d45" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4f6fb"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1220" height="375" fill="url(#bg)"/>

  <text x="610" y="16" text-anchor="middle"
        font-family="'Segoe UI',Arial,sans-serif"
        font-size="16" font-weight="700" fill="#1e2d45">
    Jerarquia de la escena: MainMenu
  </text>

  <!-- ROOT -->
  <rect x="460" y="24" width="280" height="50" rx="10" ry="10"
        fill="#1e2d45" filter="url(#sh)"/>
  <text x="600" y="47" text-anchor="middle"
        font-family="'Segoe UI',Arial,sans-serif"
