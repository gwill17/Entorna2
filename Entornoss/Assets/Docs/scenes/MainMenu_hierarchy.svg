  <rect x="825" y="204" width="130" height="60" rx="8" ry="8"
        fill="#f5edff" stroke="#9060c0" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="825" y="204" width="130" height="5" rx="8" ry="8" fill="#9060c0"/>
  <rect x="825" y="207" width="130" height="2" fill="#9060c0"/>
  <text x="890" y="222" text-anchor="middle"
        font-family="'Segoe UI',Arial,sans-serif"
        font-size="12" font-weight="700" fill="#1e2d45">ButtonOptions</text>
  <text x="890" y="237" text-anchor="middle"
        font-family="'Segoe UI',Arial,sans-serif"
        font-size="8.5" fill="#5030a0">OnOptions</text>
  <text x="890" y="251" text-anchor="middle"
        font-family="'Segoe UI',Arial,sans-serif"
        font-size="8.5" fill="#5030a0">ButtonClicked()</text>

  <!-- NIVEL 2: ButtonExit -->
  <rect x="945" y="204" width="130" height="60" rx="8" ry="8"
        fill="#f5edff" stroke="#9060c0" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="945" y="204" width="130" height="5" rx="8" ry="8" fill="#9060c0"/>
  <rect x="945" y="207" width="130" height="2" fill="#9060c0"/>
  <text x="1010" y="222" text-anchor="middle"
        font-family="'Segoe UI',Arial,sans-serif"
        font-size="12" font-weight="700" fill="#1e2d45">ButtonExit</text>
  <text x="1010" y="237" text-anchor="middle"
        font-family="'Segoe UI',Arial,sans-serif"
        font-size="8.5" fill="#5030a0">OnExitButton</text>
  <text x="1010" y="251" text-anchor="middle"
        font-family="'Segoe UI',Arial,sans-serif"
        font-size="8.5" fill="#5030a0">Clicked()</text>

  <!-- NIVEL 2: MapsDropdown -->
  <rect x="1065" y="204" width="130" height="60" rx="8" ry="8"
        fill="#f5edff" stroke="#9060c0" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="1065" y="204" width="130" height="5" rx="8" ry="8" fill="#9060c0"/>
  <rect x="1065" y="207" width="130" height="2" fill="#9060c0"/>
  <text x="1130" y="222" text-anchor="middle"
        font-family="'Segoe UI',Arial,sans-serif"
        font-size="12" font-weight="700" fill="#1e2d45">MapsDropdown</text>
  <text x="1130" y="237" text-anchor="middle"
        font-family="'Segoe UI',Arial,sans-serif"
        font-size="8.5" fill="#5030a0">TMP_Dropdown</text>
  <text x="1130" y="251" text-anchor="middle"
        font-family="'Segoe UI',Arial,sans-serif"
        font-size="8.5" fill="#5030a0">MapConfig[ ]</text>

  <!-- LEYENDA -->
  <rect x="10" y="278" width="620" height="72" rx="8" ry="8"
        fill="#ffffff" fill-opacity="0.82" stroke="#c0cce0" stroke-width="1.2"/>
  <text x="25" y="296" font-family="'Segoe UI',Arial,sans-serif"
        font-size="11" font-weight="700" fill="#1e2d45">Leyenda de tipos</text>

  <rect x="25" y="304" width="12" height="12" rx="3" ry="3"
        fill="#f0f2f8" stroke="#7080a0" stroke-width="1"/>
  <text x="42" y="315" font-family="'Segoe UI',Arial,sans-serif"
        font-size="10" fill="#3a4a6a">Unity estandar (Camera, Light, EventSystem)</text>

  <rect x="25" y="321" width="12" height="12" rx="3" ry="3"
        fill="#e0ecff" stroke="#4070c0" stroke-width="1"/>
  <text x="42" y="332" font-family="'Segoe UI',Arial,sans-serif"
        font-size="10" fill="#3a4a6a">Script personalizado</text>

  <rect x="25" y="338" width="12" height="12" rx="3" ry="3"
        fill="#e4f5e4" stroke="#50a050" stroke-width="1"/>
  <text x="42" y="349" font-family="'Segoe UI',Arial,sans-serif"
        font-size="10" fill="#3a4a6a">Grid / Tilemap</text>

  <rect x="220" y="304" width="12" height="12" rx="3" ry="3"
        fill="#ede0ff" stroke="#7040c0" stroke-width="1"/>
  <text x="237" y="315" font-family="'Segoe UI',Arial,sans-serif"
        font-size="10" fill="#3a4a6a">Canvas (script adjunto)</text>

  <rect x="220" y="321" width="12" height="12" rx="3" ry="3"
        fill="#f5edff" stroke="#9060c0" stroke-width="1"/>
  <text x="237" y="332" font-family="'Segoe UI',Arial,sans-serif"
        font-size="10" fill="#3a4a6a">Elemento UI hijo (botones, dropdown)</text>

  <rect x="220" y="338" width="12" height="12" rx="3" ry="3"
        fill="#d8f0d8" stroke="#3da03d" stroke-width="1"/>
  <text x="237" y="349" font-family="'Segoe UI',Arial,sans-serif"
        font-size="10" fill="#3a4a6a">Tilemap hijo</text>
</svg>